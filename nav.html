    <script>
      const links = document.querySelectorAll(".nav-links a");

      function setActive(filename) {
        links.forEach((l) => {
          l.classList.remove("active");
          if (l.getAttribute("href") === filename) l.classList.add("active");
        });
      }

      // Set active on click
      links.forEach((link) => {
        link.addEventListener("click", () =>
          setActive(link.getAttribute("href"))
        );
      });

      // Set active on load based on the main frame's current page
      try {
        const mainFrame = window.parent.document.querySelector(
          '#main-content, [name="main"]'
        );
        if (mainFrame) {
          const src = mainFrame.src || mainFrame.getAttribute("src") || "";
          const filename = src.split("/").pop().split("?")[0];
          if (filename) setActive(filename);
        }
      } catch (e) {}

      // Also listen for the parent to tell us which page loaded
      window.addEventListener("message", (e) => {
        if (e.data && e.data.activePage) setActive(e.data.activePage);
      });
    </script>
